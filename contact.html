<!DOCTYPE html>
<!-- Declares this as an HTML5 document -->

<html lang="en">
  <head>
    <!-- Head section: Contains metadata and links to external resources -->
    <meta charset="UTF-8" />
    <!-- Sets character encoding to UTF-8 for proper text display -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Makes the page responsive on mobile devices -->
    <title>Contact</title>
    <!-- Sets the page title shown in the browser tab -->
    <link rel="stylesheet" href="css/main.css" />
    <!-- Links to the main CSS stylesheet for styling -->
    <link rel="stylesheet" href="css/contact.css" />
    <!-- Links to the contact page CSS stylesheet -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!-- Preconnects to Google Fonts for faster loading -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shrikhand&display=swap" rel="stylesheet">
    <link rel="preload" as="font" href="font/Fineday/Fineday/Fineday-StyleOne.ttf" type="font/ttf" crossorigin>
  </head>

  <body>
    <!-- Main content area of the page -->
    <header>
      <div class="header-content">
        <img src="img/logo.png" alt="Profile" class="header-image" />
        <div class="header-text">Keisha Jaman</div>
      </div>
      <nav class="header-buttons">
        <button>Home</button>
        <button>My work</button>
        <button>About me</button>
        <button>Contact</button>
      </nav>
    </header>
    <!-- Add your contact information and form here -->
    <div class="contact-container">
      <div class="contact-title">Get In Touch</div>
      
      <div class="contact-content">
        <!-- Contact Form -->
        <div class="contact-form-wrapper">
          <form class="contact-form" id="contactForm">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
              <label for="subject">Subject</label>
              <input type="text" id="subject" name="subject" required>
            </div>

            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" rows="6" required></textarea>
            </div>

            <button type="submit" class="submit-button">Send Message</button>
          </form>
        </div>

        <!-- Contact Information -->
        <div class="contact-info-wrapper">
          <div class="contact-info-box">
            <h3 class="info-title">Contact Information</h3>
            
            <div class="info-item">
              <h4 class="info-label">Email</h4>
              <p class="info-text"><a href="mailto:keisshakjam07@gmail.com">keisshakjam07@gmail.com</a></p>
            </div>

            <div class="info-item">
              <h4 class="info-label">Phone</h4>
              <p class="info-text"><a href="tel:+1234567890">+597 871 4091</a></p>
            </div>

            <div class="info-item">
              <h4 class="info-label">Location</h4>
              <p class="info-text">Paramaribo, Suriname</p>
            </div>

            <div class="info-item">
              <h4 class="info-label">Follow Me</h4>
              <div class="social-links">
                <a href="#" class="social-link" title="LinkedIn">LinkedIn</a>
                <a href="#" class="social-link" title="GitHub">GitHub</a>
                <a href="#" class="social-link" title="Twitter">Twitter</a>
                <a href="#" class="social-link" title="Instagram">Instagram</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <!-- End of page content -->

  <script src="js/navigation.js"></script>
  <script src="js/contact.js"></script>
</html>
